<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Venue Booking Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Event Venue Booking Checker</h1>
  </header>

  <main>
    <section class="grid-section">
      <h2>Select an Hourly Slot</h2>
      <div id="slotsGrid" class="grid"></div>
      <p id="message"></p>
    </section>

    <section class="summary-section">
      <h2>Booking Summary</h2>
      <ul id="summaryList"></ul>
      <button id="clearBookings">Clear All Bookings</button>
    </section>
  </main>

  <footer>
    <p>© 2026 Venue Booking System | Designed by Amulya</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
